<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">
  <!--
   Pattern: ascii-wordmark + sparse-corner-chrome
   Source: Nozomio (nozomio.com) + Ghostty ASCII mark, corpus refs
   Specific decisions adopted:
     1. Large density-block ASCII figlet wordmark (ANSI Shadow) as the hero centerpiece
     2. Tiny uppercase mono labels pinned to all four corners; "ONLINE ●" green status (Nozomio)
     3. "◇ label ↗" link rows, diamond glyph + trailing arrow (Nozomio's link grammar)
  -->
  <style>
    .blink { animation: blink 1.15s steps(1) infinite; }
    @keyframes blink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
  </style>
  <rect width="900" height="280" fill="#08080b"/>

  <!-- corner chrome -->
  <text x="40" y="34" font-size="11" letter-spacing="2" fill="#8b949e">◆ MAXIMUS BEATO</text>
  <text x="40" y="50" font-size="11" letter-spacing="2" fill="#4b5563">CTO · VERTIKALX</text>
  <text x="860" y="34" text-anchor="end" font-size="11" letter-spacing="2" fill="#4b5563">PURDUE CS '26</text>
  <text x="860" y="50" text-anchor="end" font-size="11" letter-spacing="2" fill="#6b7280">ONLINE <tspan fill="#3fb950">●</tspan></text>

  <!-- ASCII figlet wordmark (ANSI Shadow, "Maximus Beato") -->
