<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {
          width: 900px;
          height: 220px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background: #0d1117;
          position: relative;
          overflow: hidden;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        /* Subtle animated gradient line at top */
        .accent-line {
          position: absolute;
          top: 0;
          left: 0;
          width: 200%;
          height: 2px;
          background: linear-gradient(90deg, transparent 0%, #58a6ff 25%, #bc8cff 50%, #58a6ff 75%, transparent 100%);
          animation: sweep 4s ease-in-out infinite;
        }

        @keyframes sweep {
          0% { transform: translateX(-50%); }
          100% { transform: translateX(0%); }
        }

        .name {
          font-size: 48px;
          font-weight: 700;
          color: #f0f6fc;
          letter-spacing: 2px;
          opacity: 0;
          transform: translateY(8px);
          animation: fadeUp 0.8s ease forwards;
          animation-delay: 0.3s;
        }

        .tagline {
          font-size: 15px;
          font-weight: 400;
          color: #8b949e;
          letter-spacing: 3px;
          margin-top: 12px;
          opacity: 0;
          transform: translateY(8px);
          animation: fadeUp 0.8s ease forwards;
          animation-delay: 0.7s;
        }

        .dots {
          display: flex;
          gap: 8px;
          margin-top: 20px;
          opacity: 0;
          animation: fadeUp 0.8s ease forwards;
          animation-delay: 1.1s;
        }

        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          animation: pulse 3s ease-in-out infinite;
        }

        .dot:nth-child(1) {
          background: #58a6ff;
          animation-delay: 0s;
        }
        .dot:nth-child(2) {
          background: #bc8cff;
          animation-delay: 1s;
        }
        .dot:nth-child(3) {
          background: #58a6ff;
          animation-delay: 2s;
        }

        @keyframes fadeUp {
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes pulse {
          0%, 100% { opacity: 0.4; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.3); }
        }

        /* Light mode */
        @media (prefers-color-scheme: light) {
          .container { background: #ffffff; }
          .name { color: #1f2328; }
          .tagline { color: #656d76; }
          .accent-line {
            background: linear-gradient(90deg, transparent 0%, #0969da 25%, #8250df 50%, #0969da 75%, transparent 100%);
          }
          .dot:nth-child(1) { background: #0969da; }
          .dot:nth-child(2) { background: #8250df; }
          .dot:nth-child(3) { background: #0969da; }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
          }
          .name, .tagline, .dots { opacity: 1; transform: none; }
        }
      </style>
      <div class="container">
        <div class="accent-line"></div>
        <div class="name">Max Beato</div>
        <div class="tagline">BUILDER · CTO · PURDUE CS '26</div>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
