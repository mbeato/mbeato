    <tspan x="42" dy="16">██╔████╔██║███████║ ╚███╔╝ ██║██╔████╔██║██║   ██║███████╗    ██████╔╝█████╗  ███████║   ██║   ██║   ██║</tspan>
    <tspan x="42" dy="16">██║╚██╔╝██║██╔══██║ ██╔██╗ ██║██║╚██╔╝██║██║   ██║╚════██║    ██╔══██╗██╔══╝  ██╔══██║   ██║   ██║   ██║</tspan>
