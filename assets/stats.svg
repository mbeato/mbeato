<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container {
          width: 900px;
          height: 120px;
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 48px;
          background: #0d1117;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        .stat {
          display: flex;
          flex-direction: column;
          align-items: center;
          opacity: 0;
          transform: translateY(10px);
          animation: fadeUp 0.6s ease forwards;
        }

        .stat:nth-child(1) { animation-delay: 0.2s; }
        .stat:nth-child(2) { animation-delay: 0.4s; }
        .stat:nth-child(3) { animation-delay: 0.6s; }
        .stat:nth-child(4) { animation-delay: 0.8s; }

        .number {
          font-size: 28px;
          font-weight: 700;
          color: #f0f6fc;
          letter-spacing: -0.5px;
        }

        .label {
          font-size: 11px;
          font-weight: 400;
          color: #8b949e;
          letter-spacing: 2px;
          text-transform: uppercase;
          margin-top: 6px;
        }

        .divider {
          width: 1px;
          height: 40px;
          background: linear-gradient(180deg, transparent, #58a6ff, transparent);
          opacity: 0;
          animation: fadeIn 0.8s ease forwards;
          animation-delay: 0.5s;
        }

        @keyframes fadeUp {
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
          to { opacity: 1; }
        }

        @media (prefers-color-scheme: light) {
          .container { background: #ffffff; }
          .number { color: #1f2328; }
          .label { color: #656d76; }
          .divider { background: linear-gradient(180deg, transparent, #0969da, transparent); }
        }

        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
          }
          .stat, .divider { opacity: 1; transform: none; }
        }
      </style>
      <div class="container">
        <div class="stat">
          <div class="number">1,000+</div>
          <div class="label">req / day</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="number">250+</div>
          <div class="label">graphql ops</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="number">60+</div>
          <div class="label">athletes</div>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <div class="number">180+</div>
          <div class="label">mpp tools</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
