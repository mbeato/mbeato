<svg width="200" height="24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fill100" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="60%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="2" width="200" height="20" rx="3" fill="#1E1B2E" stroke="#2D2640" stroke-width="1"/>
  <rect x="2" y="4" width="196" height="16" rx="2" fill="url(#fill100)" filter="url(#glow)"/>
  <text x="100" y="16" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#FFFFFF">100%</text>
</svg>
