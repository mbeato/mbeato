<svg width="900" height="12" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="energy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E1B2E" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7B2FBE" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="1"/>
      <stop offset="80%" stop-color="#EC4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1E1B2E" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="50" y1="6" x2="850" y2="6" stroke="url(#energy)" stroke-width="2" filter="url(#glow)"/>
</svg>
