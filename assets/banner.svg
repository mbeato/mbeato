<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="aura" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#A855F7" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#EC4899" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1E1B2E" stop-opacity="0"/>
    </radialGradient>

    <!-- Psychic energy glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for accents -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Aura wisps -->
    <linearGradient id="wisp1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wisp2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0"/>
      <stop offset="50%" stop-color="#EC4899" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="900" height="200" fill="#0F0D1A"/>

  <!-- Psychic aura radial -->
  <rect width="900" height="200" fill="url(#aura)"/>

  <!-- Floating energy wisps -->
  <ellipse cx="200" cy="80" rx="120" ry="2" fill="url(#wisp1)" opacity="0.5" transform="rotate(-8, 200, 80)"/>
  <ellipse cx="700" cy="120" rx="100" ry="1.5" fill="url(#wisp2)" opacity="0.4" transform="rotate(5, 700, 120)"/>
  <ellipse cx="450" cy="160" rx="150" ry="1.5" fill="url(#wisp1)" opacity="0.3" transform="rotate(-3, 450, 160)"/>

  <!-- Small energy particles -->
  <circle cx="150" cy="60" r="2" fill="#A855F7" opacity="0.6" filter="url(#strongGlow)"/>
  <circle cx="750" cy="50" r="1.5" fill="#EC4899" opacity="0.5" filter="url(#strongGlow)"/>
  <circle cx="300" cy="150" r="1.5" fill="#22D3EE" opacity="0.4" filter="url(#strongGlow)"/>
  <circle cx="600" cy="40" r="2" fill="#A855F7" opacity="0.5" filter="url(#strongGlow)"/>
  <circle cx="820" cy="140" r="1" fill="#EC4899" opacity="0.6" filter="url(#strongGlow)"/>
  <circle cx="100" cy="130" r="1.5" fill="#22D3EE" opacity="0.3" filter="url(#strongGlow)"/>

  <!-- Name text with glow -->
  <text x="450" y="95" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="4" fill="#F8FAFC" filter="url(#glow)">MAX BEATO</text>

  <!-- Subtitle -->
  <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="6" fill="#94A3B8">ESPER  ·  BUILDER  ·  CTO</text>

  <!-- Percentage counter in corner -->
  <rect x="770" y="15" width="110" height="28" rx="4" fill="#0F0D1A" stroke="#7B2FBE" stroke-width="1" opacity="0.8"/>
  <text x="825" y="34" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="700" fill="#A855F7">???%</text>
</svg>
