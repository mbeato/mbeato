name: Update WakaTime Chart

on:
  schedule:
    - cron: '30 0 * * *'  # daily at 12:30 AM UTC
  workflow_dispatch:  # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate WakaTime SVG
        run: node scripts/generate-wakatime.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/wakatime.svg
          git diff --staged --quiet || (git commit -m "update wakatime chart" && git push)
